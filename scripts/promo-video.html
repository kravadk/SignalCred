<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MemeLaunch Promo Renderer</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050510;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #050510;
    }
  </style>
</head>
<body>
<canvas id="stage" width="3840" height="2160"></canvas>
<script>
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d", { alpha: false });
const W = canvas.width;
const H = canvas.height;
const DURATION = 74_000;
const FPS = 30;
const DPR = W / 1920;

const scenes = [
  { start: 0, end: 7000, kicker: "BAGS TOKENS MOVE FAST", title: "Trust should move faster.", body: "MemeLaunch turns every Bags launch into a verifiable asset profile.", accent: "#ff6a58" },
  { start: 7000, end: 15500, kicker: "LAUNCH", title: "Launch through Bags.", body: "Create a token, configure fee share, sign in wallet, and publish the first verified creator update.", accent: "#ffb84d" },
  { start: 15500, end: 24500, kicker: "TRUST INDEX", title: "Every token gets proof.", body: "Bags source, pool proof, market source, fees, risk labels, and explorer links in one indexed view.", accent: "#69d99a" },
  { start: 24500, end: 34500, kicker: "BEFORE YOU BUY", title: "Open the Trust Passport.", body: "Source proof. Pool proof. Creator proof. Fee loop. Claim receipts. Social proof. USDT campaign proof.", accent: "#72c7ff" },
  { start: 34500, end: 44500, kicker: "CREATOR REPUTATION", title: "Creators build history.", body: "Creator Trust Graph tracks launches, fees, claims, social quality, campaigns, and suspicious patterns.", accent: "#b48dff" },
  { start: 44500, end: 54500, kicker: "FEE LOOP EVIDENCE", title: "Fees become reputation.", body: "Generated fees → claimed fees → Solscan receipt → USDT campaign funding proof.", accent: "#00ff88" },
  { start: 54500, end: 64000, kicker: "SOCIAL FINANCE", title: "Social only counts with context.", body: "Square ranks token-linked official updates, milestones, campaigns, and community proof.", accent: "#ff6a84" },
  { start: 64000, end: 74000, kicker: "MEMELAUNCH", title: "The trust layer for Bags tokens.", body: "Launch. Verify. Prove. Share. Embed.", accent: "#ffffff" },
];

function clamp(v, a = 0, b = 1) { return Math.max(a, Math.min(b, v)); }
function ease(t) { t = clamp(t); return 1 - Math.pow(1 - t, 3); }
function smooth(t) { t = clamp(t); return t * t * (3 - 2 * t); }
function lerp(a, b, t) { return a + (b - a) * t; }
function sceneAt(ms) { return scenes.find(s => ms >= s.start && ms < s.end) || scenes[scenes.length - 1]; }
function sceneProgress(scene, ms) { return clamp((ms - scene.start) / (scene.end - scene.start)); }

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapText(text, x, y, maxWidth, lineHeight, font, fill) {
  ctx.font = font;
  ctx.fillStyle = fill;
  const words = text.split(" ");
  let line = "";
  let yy = y;
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, yy);
      line = word;
      yy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, yy);
}

function drawBackground(ms, accent) {
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, "#0b071d");
  g.addColorStop(0.42, "#100a28");
  g.addColorStop(1, "#04040b");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = "screen";
  const orbs = [
    [620 + Math.sin(ms / 4200) * 90, 410 + Math.cos(ms / 4700) * 70, 760, accent, 0.22],
    [3060 + Math.cos(ms / 3900) * 140, 330 + Math.sin(ms / 5200) * 90, 820, "#7f5cff", 0.20],
    [2680 + Math.sin(ms / 5100) * 120, 1760 + Math.cos(ms / 6200) * 80, 980, "#00ff88", 0.13],
    [890 + Math.cos(ms / 5600) * 100, 1750 + Math.sin(ms / 4400) * 70, 780, "#ff6a84", 0.12],
  ];
  for (const [x, y, r, color, alpha] of orbs) {
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, color + Math.floor(alpha * 255).toString(16).padStart(2, "0"));
    rg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1;
  for (let x = -200; x < W + 200; x += 160) {
    ctx.beginPath();
    ctx.moveTo(x + Math.sin(ms / 5000) * 26, 0);
    ctx.lineTo(x - 420 + Math.cos(ms / 5200) * 26, H);
    ctx.stroke();
  }
  ctx.restore();

  const noiseCount = 520;
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = "#ffffff";
  for (let i = 0; i < noiseCount; i++) {
    const x = (Math.sin(i * 12.9898 + ms * 0.00009) * 43758.5453) % 1;
    const y = (Math.sin(i * 78.233 + ms * 0.00007) * 24634.6345) % 1;
    ctx.fillRect(Math.abs(x) * W, Math.abs(y) * H, 2, 2);
  }
  ctx.restore();
}

function drawLogo(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  const grad = ctx.createLinearGradient(-44, -44, 44, 44);
  grad.addColorStop(0, "#ff3f6e");
  grad.addColorStop(0.55, "#ff784d");
  grad.addColorStop(1, "#ffd76a");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 36, 48, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.86)";
  ctx.beginPath();
  ctx.ellipse(4, -7, 13, 28, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawNav(ms, scene) {
  ctx.save();
  ctx.globalAlpha = 0.92;
  roundedRect(110, 84, W - 220, 116, 36);
  ctx.fillStyle = "rgba(10,8,25,0.72)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 2;
  ctx.stroke();
  drawLogo(172, 142, 0.72);
  ctx.fillStyle = "#ffffff";
  ctx.font = "900 34px system-ui";
  ctx.fillText("MEMELAUNCH", 230, 154);
  const items = ["Trust Index", "Passport", "Creators", "Fees", "Square"];
  ctx.font = "800 24px system-ui";
  let x = 1410;
  for (const item of items) {
    ctx.fillStyle = item === scene.kicker || (scene.kicker.includes("TRUST") && item === "Trust Index") ? scene.accent : "rgba(255,255,255,0.48)";
    ctx.fillText(item, x, 153);
    x += ctx.measureText(item).width + 62;
  }
  roundedRect(W - 560, 106, 390, 72, 24);
  const grad = ctx.createLinearGradient(W - 560, 106, W - 170, 178);
  grad.addColorStop(0, "#ff3f6e");
  grad.addColorStop(1, "#ffb84d");
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = "#ffffff";
  ctx.font = "900 25px system-ui";
  ctx.fillText("Launch Token", W - 438, 151);
  ctx.restore();
}

function drawHeroText(scene, ms) {
  const p = sceneProgress(scene, ms);
  const enter = ease(Math.min(p / 0.25, 1));
  const exit = ease(Math.max((p - 0.82) / 0.18, 0));
  const alpha = enter * (1 - exit);
  const yShift = lerp(70, 0, enter) - exit * 50;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(0, yShift);
  ctx.fillStyle = scene.accent;
  ctx.font = "900 30px system-ui";
  ctx.letterSpacing = "4px";
  ctx.fillText(scene.kicker, 214, 560);
  ctx.letterSpacing = "0px";
  ctx.fillStyle = "#ffffff";
  ctx.font = "950 136px system-ui";
  const words = scene.title.split(" ");
  let y = 705;
  let line = "";
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > 1420 && line) {
      ctx.fillText(line, 210, y);
      y += 142;
      line = word;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 210, y);
  wrapText(scene.body, 220, y + 130, 1330, 56, "700 43px system-ui", "rgba(255,255,255,0.66)");
  ctx.restore();
}

function drawMetricCard(x, y, w, h, label, value, accent, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedRect(x, y, w, h, 28);
  ctx.fillStyle = "rgba(255,255,255,0.075)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.38)";
  ctx.font = "900 21px system-ui";
  ctx.fillText(label.toUpperCase(), x + 32, y + 48);
  ctx.fillStyle = accent;
  ctx.font = "950 48px ui-monospace, monospace";
  ctx.fillText(value, x + 32, y + 114);
  ctx.restore();
}

function drawDashboard(scene, ms) {
  const p = sceneProgress(scene, ms);
  const enter = ease(Math.min(p / 0.34, 1));
  const x = lerp(W + 160, 1800, enter);
  const y = 405 + Math.sin(ms / 1400) * 12;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-0.025 + Math.sin(ms / 3400) * 0.01);
  roundedRect(0, 0, 1760, 1080, 46);
  ctx.fillStyle = "rgba(14,13,31,0.92)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.14)";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = "#ffffff";
  ctx.font = "950 62px system-ui";
  const title = scene.kicker === "MEMELAUNCH" ? "Grant Status" :
    scene.kicker.includes("PASSPORT") || scene.kicker.includes("BEFORE") ? "Trust Passport" :
    scene.kicker.includes("CREATOR") ? "Creator Trust Graph" :
    scene.kicker.includes("FEE") ? "Fee Loop Evidence" :
    scene.kicker.includes("SOCIAL") ? "Token Social Proof" :
    scene.kicker.includes("LAUNCH") ? "Bags Launch Flow" :
    "Bags Trust Index";
  ctx.fillText(title, 68, 100);
  ctx.font = "800 26px system-ui";
  ctx.fillStyle = "rgba(255,255,255,0.42)";
  ctx.fillText("source-labeled / no fake data / explorer-verifiable", 70, 145);

  const accent = scene.accent;
  drawMetricCard(70, 210, 370, 165, "Trust Score", scene.kicker.includes("TRUST") ? "86" : "LIVE", accent);
  drawMetricCard(470, 210, 370, 165, "Lifetime Fees", "5.18 SOL", "#00ff88");
  drawMetricCard(870, 210, 370, 165, "USDT Value", "$780", "#ffcc7a");
  drawMetricCard(1270, 210, 370, 165, "Proof", "OK", "#69d99a");

  const rows = [
    ["Bags source proof", "verified", "bags.fm"],
    ["Pool proof", "verified", "Meteora"],
    ["Creator/admin proof", "verified", "Bags creators"],
    ["Fee Loop Evidence", scene.kicker.includes("FEE") ? "active" : "warming", "snapshots"],
    ["Claim receipt", "Solscan", "tx link"],
    ["Social proof", scene.kicker.includes("SOCIAL") ? "ranked" : "token-linked", "Square"],
  ];
  for (let i = 0; i < rows.length; i++) {
    const yy = 450 + i * 88;
    roundedRect(70, yy, 1570, 64, 18);
    ctx.fillStyle = i % 2 ? "rgba(255,255,255,0.045)" : "rgba(255,255,255,0.07)";
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.font = "850 30px system-ui";
    ctx.fillText(rows[i][0], 102, yy + 42);
    ctx.fillStyle = rows[i][1] === "verified" || rows[i][1] === "active" || rows[i][1] === "ranked" ? "#00ff88" : "#ffcc7a";
    ctx.font = "900 27px system-ui";
    ctx.fillText(rows[i][1], 1020, yy + 42);
    ctx.fillStyle = "rgba(255,255,255,0.38)";
    ctx.font = "800 24px ui-monospace, monospace";
    ctx.fillText(rows[i][2], 1300, yy + 42);
  }

  roundedRect(70, 1000, 600, 58, 18);
  ctx.fillStyle = "rgba(0,255,136,0.12)";
  ctx.fill();
  ctx.fillStyle = "#69d99a";
  ctx.font = "900 24px system-ui";
  ctx.fillText("/passport/[mint]  •  /api/public/token/[mint]/trust", 100, 1037);
  ctx.restore();
}

function drawOrbit(scene, ms) {
  const cx = 2860;
  const cy = 1140;
  const p = sceneProgress(scene, ms);
  const pulse = 0.5 + Math.sin(ms / 420) * 0.5;
  ctx.save();
  ctx.globalAlpha = 0.96;
  ctx.translate(cx, cy);
  ctx.rotate(ms / 9000);
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 3;
  for (const r of [250, 385, 520]) {
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.26, r * 0.68, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 240);
  coreGrad.addColorStop(0, scene.accent);
  coreGrad.addColorStop(0.45, "rgba(255,255,255,0.28)");
  coreGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 245 + pulse * 24, 0, Math.PI * 2);
  ctx.fill();
  drawLogo(0, 0, 2.6 + pulse * 0.08);
  const nodes = ["Bags API", "Creator", "Fees", "Solscan", "USDT", "Social"];
  ctx.font = "900 25px system-ui";
  for (let i = 0; i < nodes.length; i++) {
    const a = (Math.PI * 2 * i) / nodes.length + ms / 3500;
    const rx = 540 + (i % 2) * 90;
    const ry = 325 + (i % 2) * 55;
    const x = Math.cos(a) * rx;
    const y = Math.sin(a) * ry;
    roundedRect(x - 120, y - 38, 240, 76, 24);
    ctx.fillStyle = "rgba(255,255,255,0.09)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    ctx.stroke();
    ctx.fillStyle = i === Math.floor(p * nodes.length) ? scene.accent : "rgba(255,255,255,0.70)";
    ctx.textAlign = "center";
    ctx.fillText(nodes[i], x, y + 9);
  }
  ctx.restore();
  ctx.textAlign = "left";
}

function drawFooter(ms) {
  const progress = clamp(ms / DURATION);
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.10)";
  roundedRect(210, H - 170, W - 420, 8, 4);
  ctx.fill();
  const grad = ctx.createLinearGradient(210, H - 170, W - 210, H - 170);
  grad.addColorStop(0, "#ff3f6e");
  grad.addColorStop(0.5, "#ffb84d");
  grad.addColorStop(1, "#00ff88");
  ctx.fillStyle = grad;
  roundedRect(210, H - 170, (W - 420) * progress, 8, 4);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.42)";
  ctx.font = "800 24px system-ui";
  ctx.fillText("MemeLaunch • Bags-native launch + trust + social finance layer", 210, H - 105);
  ctx.fillStyle = "rgba(255,255,255,0.28)";
  ctx.font = "700 22px ui-monospace, monospace";
  ctx.fillText("/grant/status  /passport/[mint]  /api/public/token/[mint]/trust", W - 1150, H - 105);
  ctx.restore();
}

function draw(ms) {
  const scene = sceneAt(ms);
  drawBackground(ms, scene.accent);
  drawNav(ms, scene);
  drawHeroText(scene, ms);
  drawDashboard(scene, ms);
  drawOrbit(scene, ms);
  drawFooter(ms);

  if (ms < 1300) {
    ctx.save();
    ctx.globalAlpha = 1 - ms / 1300;
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  if (DURATION - ms < 1400) {
    ctx.save();
    ctx.globalAlpha = 1 - (DURATION - ms) / 1400;
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

let renderStart = 0;
let recorder;
let chunks = [];
let recorded = false;
let resolveDone;
window.__promoDone = new Promise((resolve) => { resolveDone = resolve; });
window.__promoStatus = "idle";
window.__promoChunks = [];
window.__promoMeta = { width: W, height: H, durationMs: DURATION, fps: FPS };

async function startRecording() {
  if (recorded) return;
  recorded = true;
  window.__promoStatus = "recording";
  chunks = [];
  const stream = canvas.captureStream(FPS);
  const mimeCandidates = [
    "video/webm;codecs=vp9",
    "video/webm;codecs=vp8",
    "video/webm",
  ];
  const mimeType = mimeCandidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
  recorder = new MediaRecorder(stream, mimeType ? { mimeType, videoBitsPerSecond: 22_000_000 } : { videoBitsPerSecond: 22_000_000 });
  window.__promoMeta.mimeType = recorder.mimeType;
  recorder.ondataavailable = async (event) => {
    if (!event.data || !event.data.size) return;
    const buffer = await event.data.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    let binary = "";
    const step = 0x8000;
    for (let i = 0; i < bytes.length; i += step) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + step));
    }
    window.__promoChunks.push(btoa(binary));
  };
  recorder.onstop = () => {
    window.__promoStatus = "done";
    resolveDone(true);
  };
  recorder.start(1000);
  renderStart = performance.now();
  requestAnimationFrame(tick);
}

function tick(now) {
  const ms = Math.min(DURATION, now - renderStart);
  draw(ms);
  if (ms >= DURATION) {
    recorder.stop();
    return;
  }
  requestAnimationFrame(tick);
}

draw(0);
window.startPromoRecording = startRecording;
</script>
</body>
</html>
