const ctx = canvas.getContext("2d", { alpha: false });
const W = canvas.width;
const H = canvas.height;
const FPS = 30;
const DURATION = 96_000;

const shots = window.SITE_DEMO_SHOTS || fallbackShots;

const images = new Map();

function clamp(v, min = 0, max = 1) { return Math.max(min, Math.min(max, v)); }
function ease(t) { t = clamp(t); return 1 - Math.pow(1 - t, 3); }
function smooth(t) { t = clamp(t); return t * t * (3 - 2 * t); }
function lerp(a, b, t) { return a + (b - a) * t; }

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrap(text, x, y, maxWidth, lineHeight, font, fill) {
  ctx.font = font;
  ctx.fillStyle = fill;
  const words = text.split(" ");
  let line = "";
  let yy = y;
  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, yy);
      line = word;
      yy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, yy);
  return yy;
}

function drawBackground(ms, accent) {
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, "#0b071d");
  grad.addColorStop(0.52, "#100a24");
  grad.addColorStop(1, "#030309");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = "screen";
  const orbs = [
    [650 + Math.sin(ms / 4100) * 120, 320 + Math.cos(ms / 4700) * 90, 860, accent, 0.20],
    [3280 + Math.cos(ms / 5200) * 160, 340 + Math.sin(ms / 4400) * 100, 900, "#7f5cff", 0.19],
    [2920 + Math.sin(ms / 5800) * 140, 1760, 1100, "#00ff88", 0.10],
  ];
  for (const [x, y, r, color, alpha] of orbs) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color + Math.floor(alpha * 255).toString(16).padStart(2, "0"));
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1;
  for (let y = 260; y < H; y += 170) {
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(ms / 2400 + y) * 16);
    ctx.lineTo(W, y + Math.cos(ms / 2600 + y) * 16);
    ctx.stroke();
  }
  ctx.restore();
}

function logo(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  const g = ctx.createLinearGradient(-45, -50, 45, 50);
  g.addColorStop(0, "#ff3f6e");
  g.addColorStop(0.55, "#ff784d");
  g.addColorStop(1, "#ffd76a");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, 36, 48, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.86)";
  ctx.beginPath();
  ctx.ellipse(4, -7, 13, 28, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function getShot(ms) {
  return shots.find((shot) => ms >= shot.start && ms < shot.end) || shots[shots.length - 1];
}

function shotProgress(shot, ms) {
  return clamp((ms - shot.start) / (shot.end - shot.start));
}

function cropForShot(shot, p, img) {
  const full = [0, 0, img.width, img.height];
  const f = shot.focus;
  const target = [f[0] * img.width, f[1] * img.height, f[2] * img.width, f[3] * img.height];
  const z = smooth(clamp((p - 0.12) / 0.46));
  const hold = 1 - smooth(clamp((p - 0.86) / 0.14));
  const t = z * hold;
  return [
    lerp(full[0], target[0], t),
    lerp(full[1], target[1], t),
    lerp(full[2], target[2], t),
    lerp(full[3], target[3], t),
  ];
}

function drawBrowserShot(shot, ms) {
  const img = images.get(shot.image);
  if (!img) return;
  const p = shotProgress(shot, ms);
  const enter = ease(clamp(p / 0.18));
  const exit = ease(clamp((p - 0.88) / 0.12));
  const alpha = enter * (1 - exit);
  const frameX = 250;
  const frameY = 280 + lerp(80, 0, enter) - exit * 50;
  const frameW = 3340;
  const frameH = 1668;
  const chromeH = 92;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = "rgba(0,0,0,0.55)";
  ctx.shadowBlur = 70;
  ctx.shadowOffsetY = 30;
  roundedRect(frameX, frameY, frameW, frameH, 48);
  ctx.fillStyle = "rgba(10,10,22,0.96)";
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "rgba(255,255,255,0.16)";
  ctx.lineWidth = 3;
  ctx.stroke();

  roundedRect(frameX, frameY, frameW, chromeH, 48);
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.fill();
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(frameX + 54 + i * 42, frameY + 46, 12, 0, Math.PI * 2);
    ctx.fillStyle = ["#ff6a58", "#ffcc7a", "#00ff88"][i];
    ctx.fill();
  }
  roundedRect(frameX + 200, frameY + 24, 1180, 44, 16);
  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.42)";
  ctx.font = "700 22px ui-monospace, monospace";
  ctx.fillText("localhost:3000  |  MemeLaunch", frameX + 228, frameY + 54);

  const contentX = frameX + 32;
  const contentY = frameY + chromeH + 28;
  const contentW = frameW - 64;
  const contentH = frameH - chromeH - 60;
  const crop = cropForShot(shot, p, img);
  ctx.save();
  roundedRect(contentX, contentY, contentW, contentH, 30);
  ctx.clip();
  ctx.drawImage(img, crop[0], crop[1], crop[2], crop[3], contentX, contentY, contentW, contentH);
  ctx.restore();

  const cursorT = smooth(clamp((p - 0.22) / 0.42));
  const startX = contentX + contentW * 0.08;
  const startY = contentY + contentH * 0.15;
  const endX = contentX + contentW * shot.cursor[0];
  const endY = contentY + contentH * shot.cursor[1];
  const cx = lerp(startX, endX, cursorT);
  const cy = lerp(startY, endY, cursorT);
  drawCursor(cx, cy, shot.accent, p);

  ctx.restore();
}

function drawCursor(x, y, accent, p) {
  ctx.save();
  const click = Math.exp(-Math.pow((p - 0.58) / 0.055, 2));
  ctx.strokeStyle = accent;
  ctx.globalAlpha = 0.35 * click;
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(x, y, 26 + click * 95, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#ffffff";
  ctx.strokeStyle = "rgba(0,0,0,0.45)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 0, y + 82);
  ctx.lineTo(x + 27, y + 61);
  ctx.lineTo(x + 52, y + 113);
  ctx.lineTo(x + 78, y + 101);
  ctx.lineTo(x + 52, y + 50);
  ctx.lineTo(x + 86, y + 50);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawCommentary(shot, ms) {
  const p = shotProgress(shot, ms);
  const enter = ease(clamp(p / 0.20));
  const exit = ease(clamp((p - 0.86) / 0.14));
  const alpha = enter * (1 - exit);
  ctx.save();
  ctx.globalAlpha = alpha;
  const panelX = 285;
  const panelY = 1530 + lerp(80, 0, enter);
  const panelW = 1500;
  const panelH = 340;
  roundedRect(panelX, panelY, panelW, panelH, 38);
  ctx.fillStyle = "rgba(5,5,16,0.86)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.16)";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = shot.accent;
  ctx.font = "950 28px system-ui";
  ctx.fillText(shot.tag, panelX + 46, panelY + 70);
  ctx.fillStyle = "#ffffff";
  ctx.font = "950 58px system-ui";
  ctx.fillText(shot.title, panelX + 44, panelY + 145);
  wrap(shot.comment, panelX + 46, panelY + 215, panelW - 100, 46, "750 34px system-ui", "rgba(255,255,255,0.68)");
  ctx.restore();
}

function drawTopBrand(ms, shot) {
  ctx.save();
  roundedRect(250, 96, 3340, 120, 38);
  ctx.fillStyle = "rgba(6,5,18,0.72)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 2;
  ctx.stroke();
  logo(326, 156, 0.72);
  ctx.fillStyle = "#ffffff";
  ctx.font = "950 34px system-ui";
  ctx.fillText("MEMELAUNCH", 384, 169);
  ctx.fillStyle = "rgba(255,255,255,0.48)";
  ctx.font = "800 24px system-ui";
  ctx.fillText("Launch | Trust Passport | Creator Graph | Fee Loop | Social Proof | USDT Treasury", 1640, 168);
  ctx.fillStyle = shot.accent;
  roundedRect(3240, 122, 250, 68, 22);
  ctx.fill();
  ctx.fillStyle = "#07100c";
  ctx.font = "950 25px system-ui";
  ctx.fillText("No fake data", 3284, 164);
  ctx.restore();
}

function drawProgress(ms) {
  ctx.save();
  const p = clamp(ms / DURATION);
  roundedRect(250, H - 110, 3340, 10, 5);
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.fill();
  const g = ctx.createLinearGradient(250, H - 110, 3590, H - 110);
  g.addColorStop(0, "#ff3f6e");
  g.addColorStop(0.52, "#ffb84d");
  g.addColorStop(1, "#00ff88");
  ctx.fillStyle = g;
  roundedRect(250, H - 110, 3340 * p, 10, 5);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.36)";
  ctx.font = "700 22px ui-monospace, monospace";
  ctx.fillText("/grant/status  ->  /token  ->  /passport/[mint]  ->  /profile/[wallet]  ->  /fees  ->  /square  ->  /launch", 250, H - 58);
  ctx.restore();
}

function draw(ms) {
  const shot = getShot(ms);
  drawBackground(ms, shot.accent);
  drawTopBrand(ms, shot);
  drawBrowserShot(shot, ms);
  drawCommentary(shot, ms);
  drawProgress(ms);
  if (ms < 1200) {
    ctx.save();
    ctx.globalAlpha = 1 - ms / 1200;
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  if (DURATION - ms < 1400) {
    ctx.save();
    ctx.globalAlpha = 1 - (DURATION - ms) / 1400;
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

async function loadImages() {
  await Promise.all(shots.map((shot) => new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { images.set(shot.image, img); resolve(); };
    img.onerror = reject;
    img.src = shot.image;
  })));
}

let recorder;
let renderStart = 0;
let resolveDone;
window.__demoDone = new Promise((resolve) => { resolveDone = resolve; });
window.__demoStatus = "idle";
window.__demoChunks = [];
window.__demoMeta = { width: W, height: H, durationMs: DURATION, fps: FPS };

async function startRecording() {
  await loadImages();
  window.__demoStatus = "recording";
  const stream = canvas.captureStream(FPS);
  const narration = await prepareNarrationAudio();
  if (narration?.track) stream.addTrack(narration.track);
  window.__demoMeta.audioTracks = stream.getAudioTracks().length;
  const candidates = [
    'video/mp4;codecs="avc1.42E01E,mp4a.40.2"',
    'video/mp4;codecs="avc1.42E01E"',
    "video/mp4",
    "video/webm;codecs=vp9",
    "video/webm",
  ];
  const mimeType = candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
  recorder = new MediaRecorder(stream, mimeType ? { mimeType, videoBitsPerSecond: 18_000_000 } : { videoBitsPerSecond: 18_000_000 });
  window.__demoMeta.mimeType = recorder.mimeType;
  recorder.ondataavailable = async (event) => {
    if (!event.data || !event.data.size) return;
    const bytes = new Uint8Array(await event.data.arrayBuffer());
    let binary = "";
    const step = 0x8000;
    for (let i = 0; i < bytes.length; i += step) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + step));
    }
    window.__demoChunks.push(btoa(binary));
  };
  recorder.onstop = () => {
    window.__demoStatus = "done";
    resolveDone(true);
  };
  recorder.start(1000);
  narration?.start?.();
  renderStart = performance.now();
  requestAnimationFrame(tick);
}

async function prepareNarrationAudio() {
  try {
    const AudioCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtor) return null;
    const audioContext = new AudioCtor();
    const destination = audioContext.createMediaStreamDestination();
    const response = await fetch(window.SITE_DEMO_NARRATION || "../public/promo/narration.wav");
    if (!response.ok) return null;
    const buffer = await audioContext.decodeAudioData(await response.arrayBuffer());
    const source = audioContext.createBufferSource();
    const gain = audioContext.createGain();
    gain.gain.value = 0.92;
    source.buffer = buffer;
    source.connect(gain);
    gain.connect(destination);
    window.__demoAudio = { audioContext, source, destination };
    return {
      track: destination.stream.getAudioTracks()[0],
      start: () => {
        audioContext.resume();
        source.start(0);
      },
    };
  } catch {
    return null;
  }
}

function tick(now) {
  const ms = Math.min(DURATION, now - renderStart);
  draw(ms);
  if (ms >= DURATION) {
    recorder.stop();
    return;
  }
  requestAnimationFrame(tick);
}

draw(0);
window.startDemoRecording = startRecording;
</script>
